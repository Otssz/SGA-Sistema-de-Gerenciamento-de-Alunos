# =====================================================================
# SGA-Edu — Configuração principal
# Valores sensíveis devem vir de variáveis de ambiente em produção
# =====================================================================

spring.application.name=sga-edu

# --- Banco de dados (ADR-002: PostgreSQL) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sgaedu}
spring.datasource.username=${DB_USER:sgaedu}
spring.datasource.password=${DB_PASS:sgaedu}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# "update" deixa o Hibernate criar/atualizar as tabelas automaticamente (modo dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Flyway desativado — Hibernate gerencia o schema em desenvolvimento
spring.flyway.enabled=false

# --- Segurança JWT (ADR-007) ---
# Gere uma chave de 256+ bits: openssl rand -hex 32
sgaedu.jwt.chave-secreta=${JWT_SECRET:TROQUE_EM_PRODUCAO_use_openssl_rand_hex_32}
sgaedu.jwt.expiracao-ms=${JWT_EXP_MS:3600000}

# --- Armazenamento de PDFs ---
sgaedu.storage.diretorio=${STORAGE_DIR:/app/documentos}

# --- Notificações (Observer — ADR-005) ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Servidor ---
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# --- Logs ---
logging.level.br.edu.sgaedu=INFO
logging.level.org.springframework.security=WARN
